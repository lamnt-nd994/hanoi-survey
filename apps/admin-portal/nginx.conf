server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location ~ /\.(?!well-known).* {
    return 404;
  }

  location ~* \.(env|ini|log|sql|sh|bak|old|ya?ml|toml|git|svn)$ {
    return 404;
  }

  location ~* \.(php|asp|aspx|jsp|cgi|pl|py)$ {
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }
}
