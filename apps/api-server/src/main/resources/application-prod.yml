spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/hanoi_survey?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${DB_USERNAME:hanoi_survey}
    password: ${DB_PASSWORD:ChangeMe123!}
  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    com.hanoisurvey.api: ${APP_LOG_LEVEL:INFO}
    org.springframework.web: INFO
    org.hibernate.SQL: OFF

app:
  upload-dir: ${APP_UPLOAD_DIR:/var/opt/hanoi-survey/uploads}
  upload-public-prefix: ${APP_UPLOAD_PUBLIC_PREFIX:uploads}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://example.com,https://admin.example.com}
  jwt:
    secret: ${JWT_SECRET}
