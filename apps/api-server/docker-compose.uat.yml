services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hanoi-survey-uat-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: uat
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-hanoi_survey_uat}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      DB_USERNAME: ${MYSQL_USER:-hanoi_survey}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ChangeMe123!}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_UPLOAD_DIR: /var/opt/hanoi-survey/uploads
      APP_UPLOAD_PUBLIC_PREFIX: ${APP_UPLOAD_PUBLIC_PREFIX:-uploads}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_MEDIA_MAX_SIZE: ${APP_MEDIA_MAX_SIZE:-10MB}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-true}
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${API_PORT:-8082}:8080"
    volumes:
      - type: bind
        source: ${HOST_UPLOADS_DIR:?HOST_UPLOADS_DIR is required}
        target: /var/opt/hanoi-survey/uploads

  mysql:
    image: mysql:8.0
    container_name: hanoi-survey-uat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootChangeMe123!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hanoi_survey_uat}
      MYSQL_USER: ${MYSQL_USER:-hanoi_survey}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ChangeMe123!}
      TZ: Asia/Ho_Chi_Minh
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-RootChangeMe123!}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${MYSQL_PORT:-3311}:3306"
    volumes:
      - type: bind
        source: ${HOST_MYSQL_DATA_DIR:?HOST_MYSQL_DATA_DIR is required}
        target: /var/lib/mysql

  adminer:
    image: adminer:4
    container_name: hanoi-survey-uat-adminer
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "${ADMINER_PORT:-8083}:8080"
    depends_on:
      mysql:
        condition: service_healthy
