services:
  web-client:
    build:
      context: ../../
      dockerfile: apps/web-client/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    container_name: hanoi-survey-web-client
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
