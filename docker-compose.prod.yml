services:
  api:
    build:
      context: ./apps/api-server
      dockerfile: Dockerfile
    container_name: hanoi-survey-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_UPLOAD_DIR: /var/opt/hanoi-survey/uploads
      APP_UPLOAD_PUBLIC_PREFIX: ${APP_UPLOAD_PUBLIC_PREFIX:-uploads}
      APP_CORS_ALLOWED_ORIGINS: ${WEB_URL},${ADMIN_URL}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      MULTIPART_MAX_FILE_SIZE: ${MULTIPART_MAX_FILE_SIZE:-10MB}
      MULTIPART_MAX_REQUEST_SIZE: ${MULTIPART_MAX_REQUEST_SIZE:-10MB}
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - type: bind
        source: ${HOST_UPLOADS_DIR:?HOST_UPLOADS_DIR is required}
        target: /var/opt/hanoi-survey/uploads

  web-client:
    build:
      context: .
      dockerfile: apps/web-client/Dockerfile
      args:
        VITE_API_BASE_URL: ${API_URL}
    container_name: hanoi-survey-web-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"

  admin-portal:
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
      args:
        VITE_API_BASE_URL: ${API_URL}
    container_name: hanoi-survey-admin-portal
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${ADMIN_PORT:-3001}:80"

  mysql:
    image: mysql:8.0
    container_name: hanoi-survey-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${MYSQL_PORT:-3310}:3306"
    volumes:
      - type: bind
        source: ${HOST_MYSQL_DATA_DIR:?HOST_MYSQL_DATA_DIR is required}
        target: /var/lib/mysql

  adminer:
    image: adminer:4
    container_name: hanoi-survey-adminer
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      mysql:
        condition: service_healthy
